# CAMBIO: La configuración de conexión que estaba en persistence.xml
# ahora va aquí, con propiedades de Spring.

# Datos de conexión (igual que en persistence.xml)
spring.datasource.url=jdbc:mysql://localhost:3306/actas?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CAMBIO: En lugar de <property name="jakarta.persistence.schema-generation.database.action" value="create"/>
# Spring Boot usa esta propiedad. "update" es más seguro que "create" (no borra tablas existentes).
# Opciones: none | validate | update | create | create-drop
spring.jpa.hibernate.ddl-auto=update

# Muestra el SQL generado por Hibernate en consola (útil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialecto MySQL para Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Nombre de la unidad de persistencia (ya no tan crítico, pero lo dejamos)
spring.jpa.persistence-unit-name=mainJPA

# Puerto del servidor embebido (por defecto es 8080)
server.port=8080

# Encoding
spring.web.encoding.charset=UTF-8
spring.web.encoding.force=true
